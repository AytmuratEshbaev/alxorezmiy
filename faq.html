<body>

  <div id="navbar-mount"></div>
  <div id="mobile-nav-mount"></div>
  <!-- ══════ PAGE HEADER ══════ -->
  <div class="page-header">
    <h1 data-i18n="nav.faq">Ko'p beriladigan savollar</h1>
    <div class="breadcrumb">
      <a href="index.html" data-i18n="common.home">Bosh sahifa</a>
      <span class="separator">/</span>
      <span class="current" data-i18n="nav.faq">FAQ</span>
    </div>
  </div>

  <!-- ══════ FAQ ACCORDION ══════ -->
  <section class="section">
    <div class="container" style="max-width:800px;">
      
      <div class="flex-between" style="margin-bottom:var(--space-xl);flex-wrap:wrap;gap:var(--space-md);">
        <h2 style="font-size:1.5rem;">Barcha savollar</h2>
        <div class="filter-group" id="faqFilters" style="margin-bottom:0;">
          <button class="filter-btn active" data-filter="all" data-i18n="common.all">Barchasi</button>
          <button class="filter-btn" data-filter="admission">Qabul</button>
          <button class="filter-btn" data-filter="education">O'quv tizimi</button>
          <button class="filter-btn" data-filter="general">Umumiy</button>
        </div>
      </div>

      <div class="accordion" id="faqAccordion">
        <!-- Filled by JS -->
      </div>
      
    </div>
  </section>

  <div id="footer-mount"></div>
  <div id="back-to-top-mount"></div>
  <script src="js/site-shell.js"></script>

  <script type="module" src="js/firebase-config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>

  <script type="module" src="js/settings-loader.js"></script>
  <script type="module" src="js/site-search.js"></script>
  <script type="module">
    import { subscribeCollection } from './js/firestore-helpers.js';

    const accordion = document.getElementById('faqAccordion');
    const filterBtns = document.querySelectorAll('#faqFilters .filter-btn');
    let allFaqs = [];
    let currentFilter = 'all';

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    }

    function renderFaqs() {
      if (!accordion) return;
      let filtered = allFaqs;
      if (currentFilter !== 'all') filtered = filtered.filter(f => f.category === currentFilter);

      if (!filtered.length) {
        accordion.innerHTML = '<p style="text-align:center;color:var(--text-tertiary);padding:60px;">Hozircha savollar yo\'q</p>';
        return;
      }

      accordion.innerHTML = filtered.map((item, i) => `
        <div class="accordion-item animate-on-scroll" style="animation-delay:${i * 0.1}s">
          <div class="accordion-header">
            <h3 style="font-size:1.1rem;font-weight:600;margin:0;">${escapeHtml(window.getLocalizedField(item, 'question'))}</h3>
            <span class="accordion-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></span>
          </div>
          <div class="accordion-body">
            <div class="accordion-body-content">
              <p style="margin:0;color:var(--text-secondary);line-height:1.6;white-space:pre-line;">${escapeHtml(window.getLocalizedField(item, 'answer'))}</p>
            </div>
          </div>
        </div>
      `).join('');

      accordion.querySelectorAll('.accordion-header').forEach(header => {
        header.addEventListener('click', () => {
          const item = header.parentElement;
          const content = header.nextElementSibling;
          const isOpen = item.classList.contains('active');
          accordion.querySelectorAll('.accordion-item').forEach(el => {
            el.classList.remove('active');
            const body = el.querySelector('.accordion-body');
            if (body) body.style.maxHeight = null;
          });
          if (!isOpen) {
            item.classList.add('active');
            content.style.maxHeight = content.scrollHeight + 'px';
          }
        });
      });

      setTimeout(() => {
        accordion.querySelectorAll('.animate-on-scroll').forEach(el => el.classList.add('visible'));
      }, 50);
    }

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.getAttribute('data-filter');
        renderFaqs();
      });
    });

    window.onLanguageChange = renderFaqs;

    document.addEventListener('DOMContentLoaded', async () => {
      accordion.innerHTML = '<p style="text-align:center;color:#94A3B8;padding:60px;">Yuklanmoqda...</p>';
      await subscribeCollection('faq', (items) => {
        items.sort((a, b) => (a.order || 0) - (b.order || 0));
        allFaqs = items;
        renderFaqs();
      });
    });
  </script>
</body>
</html>
