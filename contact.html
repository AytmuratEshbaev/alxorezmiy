<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0D0D5C">
  <title>Bog'lanish - Al-Xorazmiy ixtisoslashtirilgan maktabi</title>
  <meta name="description" content="Maktab bilan bog'lanish: manzil, telefon, email. Xarita va onlayn xabar yuborish formasi.">
  <link rel="canonical" href="https://alxorezmiy.uz/contact">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="icon" type="image/webp" sizes="512x512" href="assets/images/logo.webp">
  <link rel="apple-touch-icon" href="assets/images/logo.webp">
  <link rel="manifest" href="manifest.json">
  <meta property="og:title" content="Bog'lanish - Al-Xorazmiy ixtisoslashtirilgan maktabi">
  <meta property="og:description" content="Maktab bilan bog'lanish: manzil, telefon, email. Xarita va onlayn xabar yuborish formasi.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://alxorezmiy.uz/contact">
  <meta property="og:site_name" content="Al-Xorazmiy maktabi">
  <meta property="og:locale" content="uz_UZ">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Bog'lanish - Al-Xorazmiy ixtisoslashtirilgan maktabi">
  <meta name="twitter:description" content="Maktab bilan bog'lanish: manzil, telefon, email. Xarita va onlayn xabar yuborish formasi.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://ik.imagekit.io" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dark-theme.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

  <div id="navbar-mount"></div>
  <div id="mobile-nav-mount"></div>
  <!-- ══════ PAGE HEADER ══════ -->
  <div class="page-header">
    <h1 data-i18n="contact_page.title">Bog'lanish</h1>
    <div class="breadcrumb">
      <a href="index.html" data-i18n="common.home">Bosh sahifa</a>
      <span class="separator">/</span>
      <span class="current" data-i18n="nav.contact">Kontakt</span>
    </div>
  </div>

  <!-- ══════ CONTACT INFO CARDS ══════ -->
  <section class="section">
    <div class="container">
      <div class="grid grid-4">
        <div class="card card-hover contact-card animate-on-scroll">
          <div class="contact-icon">📍</div>
          <div>
            <h4 data-i18n="contact_page.address_label">Manzil</h4>
            <p data-setting="address">Nukus shahri, Amir Temur ko'chasi 1-uy</p>
          </div>
        </div>
        <div class="card card-hover contact-card animate-on-scroll animate-delay-1">
          <div class="contact-icon">📞</div>
          <div>
            <h4 data-i18n="contact_page.phone_label">Telefon</h4>
            <p data-setting="phone">+998 61 222-33-44</p>
          </div>
        </div>
        <div class="card card-hover contact-card animate-on-scroll animate-delay-2">
          <div class="contact-icon">📧</div>
          <div>
            <h4 data-i18n="contact_page.email_label">Email</h4>
            <p data-setting="email">info@alxorazmiy-nukus.uz</p>
          </div>
        </div>
        <div class="card card-hover contact-card animate-on-scroll animate-delay-3">
          <div class="contact-icon">🕐</div>
          <div>
            <h4 data-i18n="contact_page.hours_label">Ish vaqti</h4>
            <p data-setting="hours">Dushanba — Shanba, 08:00 — 17:00</p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ══════ MAP + FORM ══════ -->
  <section class="section" style="padding-top:0;">
    <div class="container">
      <div class="grid grid-2 contact-grid-2" style="gap:var(--space-2xl);">
        <!-- Contact Form -->
        <div class="animate-on-scroll">
          <h2 data-i18n="contact_page.form_title" style="margin-bottom:var(--space-xl);">Xabar yuborish</h2>
          <form id="contactForm">
            <div class="form-group">
              <label for="contactName" data-i18n="contact_page.form_name">Ismingiz</label>
              <input type="text" id="contactName" class="form-control" placeholder="Ismingiz" data-i18n="contact_page.form_name" required>
            </div>
            <div class="form-group">
              <label for="contactEmail" data-i18n="contact_page.form_email">Email manzilingiz</label>
              <input type="email" id="contactEmail" class="form-control" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
              <label for="contactSubject" data-i18n="contact_page.form_subject">Mavzu</label>
              <input type="text" id="contactSubject" class="form-control" placeholder="Mavzu" data-i18n="contact_page.form_subject" required>
            </div>
            <div class="form-group">
              <label for="contactMessage" data-i18n="contact_page.form_message">Xabaringiz</label>
              <textarea id="contactMessage" class="form-control" placeholder="Xabaringiz..." rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-full" id="contactSubmit">
              <span data-i18n="contact_page.form_send">Yuborish</span>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </button>
          </form>
        </div>

        <!-- Map -->
        <div class="animate-on-scroll animate-delay-1">
          <h2 data-i18n="contact_page.map_title" style="margin-bottom:var(--space-xl);">Xaritada</h2>
          <div class="map-container">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14792.5!2d59.603!3d42.462!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x41dd9b0261fb71e9%3A0x7e8e3ad743d0e1!2sNukus%2C%20Karakalpakstan!5e0!3m2!1sen!2s!4v1"
              width="100%" height="100%" style="border:0;" allowfullscreen loading="lazy"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>

          <!-- Social Links -->
          <div style="margin-top:var(--space-xl);">
            <h3 data-i18n="contact_page.social_title" style="margin-bottom:var(--space-md);">Ijtimoiy tarmoqlar</h3>
            <div class="flex gap-md" style="flex-wrap:wrap;">
              <a href="#" class="btn btn-secondary btn-sm" style="gap:8px;" data-social="telegram" target="_blank" rel="noopener">
                <span>✈️</span> Telegram
              </a>
              <a href="#" class="btn btn-secondary btn-sm" style="gap:8px;" data-social="instagram" target="_blank" rel="noopener">
                <span>📷</span> Instagram
              </a>
              <a href="#" class="btn btn-secondary btn-sm" style="gap:8px;" data-social="facebook" target="_blank" rel="noopener">
                <span>📘</span> Facebook
              </a>
              <a href="#" class="btn btn-secondary btn-sm" style="gap:8px;" data-social="youtube" target="_blank" rel="noopener">
                <span>▶️</span> YouTube
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-mount"></div>
  <div id="back-to-top-mount"></div>
  <script src="js/site-shell.js"></script>

  <script type="module" src="js/firebase-config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>

  <script type="module" src="js/settings-loader.js"></script>
  <script type="module" src="js/site-search.js"></script>
  <script type="module">
    import { addDocument } from './js/firestore-helpers.js';

    document.getElementById('contactForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('contactSubmit');
      const originalHTML = btn.innerHTML;
      btn.innerHTML = '<span class="loading-spinner" style="width:20px;height:20px;border-width:2px;"></span> Yuborilmoqda...';
      btn.disabled = true;

      const data = {
        name: document.getElementById('contactName').value.trim(),
        email: document.getElementById('contactEmail').value.trim(),
        subject: document.getElementById('contactSubject').value.trim(),
        message: document.getElementById('contactMessage').value.trim()
      };

      try {
        // 1. Firestore'ga yozish (asosiy — admin paneldan ko'rish uchun)
        await addDocument('messages', { ...data, read: false });

        // 2. Email yuborish (qo'shimcha — admin emailga darhol)
        // Email muvaffaqiyatsiz bo'lsa ham, xabar Firestore'da qoladi.
        fetch('/api/send-message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        }).catch(err => console.warn('Email notification failed:', err));

        showToast('Xabaringiz muvaffaqiyatli yuborildi!', 'success');
        this.reset();
      } catch (err) {
        console.error('Send error:', err);
        showToast('Xato: xabar yuborilmadi. Qaytadan urinib ko\'ring.', 'error');
      } finally {
        btn.innerHTML = originalHTML;
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
