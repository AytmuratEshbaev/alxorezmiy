<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#14110C">
  <title>404 — Sahifa topilmadi | Al-Xorazmiy maktabi</title>
  <meta name="description" content="Bu sahifa topilmadi yoki ko'chirilgan.">
  <link rel="icon" type="image/svg+xml" href="/assets/icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/images/logo.png">
  <link rel="apple-touch-icon" href="/assets/images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://ik.imagekit.io" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter+Tight:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dark-theme.css">
  <link rel="stylesheet" href="/css/responsive.css">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>
  <div id="navbar-mount"></div>
  <div id="mobile-nav-mount"></div>

  <section style="min-height:90vh;display:flex;align-items:center;justify-content:center;padding:var(--s-12) var(--s-4);text-align:center;position:relative;overflow:hidden;">
    <div aria-hidden="true" style="position:absolute;inset:0;z-index:-1;
      background:radial-gradient(ellipse at top,rgba(167,139,250,.18) 0%,transparent 50%),
                 radial-gradient(ellipse at bottom,rgba(129,140,248,.16) 0%,transparent 50%);
      opacity:0.6;"></div>
    <div aria-hidden="true" style="position:absolute;inset:0;z-index:-1;
      background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
      background-size:48px 48px;
      mask-image:radial-gradient(ellipse at center,black 30%,transparent 80%);"></div>

    <div class="container" style="max-width:640px;position:relative;">
      <div style="font-family:var(--font-display);font-size:clamp(6rem,16vw,11rem);font-weight:800;
                  background:var(--brand-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
                  line-height:.9;margin-bottom:var(--s-6);letter-spacing:-.05em;
                  animation:float 6s ease-in-out infinite;">404</div>
      <span class="hero-eyebrow" style="display:inline-flex;margin-bottom:var(--s-4);">Sahifa topilmadi</span>
      <h1 style="margin-bottom:var(--s-4);font-size:clamp(1.5rem,3vw,2.25rem);">Yo'qolib qoldingiz</h1>
      <p style="font-size:1.0625rem;margin-bottom:var(--s-8);color:var(--text-mid);line-height:1.6;">
        Siz qidirgan sahifa mavjud emas, o'chirilgan, yoki manzili o'zgartirilgan bo'lishi mumkin.
      </p>
      <div style="display:flex;gap:var(--s-3);justify-content:center;flex-wrap:wrap;">
        <a href="/" class="btn btn-primary btn-lg">← Bosh sahifaga</a>
        <a href="/contact" class="btn btn-ghost btn-lg" style="color:var(--text-hi);border-color:var(--border);">Bog'lanish</a>
      </div>
      <div style="margin-top:var(--s-12);padding-top:var(--s-6);border-top:1px solid var(--border-subtle);">
        <p style="font-size:0.875rem;color:var(--text-lo);margin-bottom:var(--s-3);">Yoki bu sahifalarga o'ting:</p>
        <div style="display:flex;gap:var(--s-4);justify-content:center;flex-wrap:wrap;">
          <a href="/about" style="font-size:0.9375rem;color:var(--brand-1);text-decoration:none;">Maktab haqida</a>
          <a href="/teachers" style="font-size:0.9375rem;color:var(--brand-1);text-decoration:none;">O'qituvchilar</a>
          <a href="/news" style="font-size:0.9375rem;color:var(--brand-1);text-decoration:none;">Yangiliklar</a>
          <a href="/admission" style="font-size:0.9375rem;color:var(--brand-1);text-decoration:none;">Qabul</a>
        </div>
      </div>
    </div>
  </section>

  <div id="footer-mount"></div>
  <div id="back-to-top-mount"></div>

  <script src="/js/site-shell.js"></script>
  <script type="module" src="/js/firebase-config.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/main.js"></script>
  <script type="module" src="/js/settings-loader.js"></script>
</body>
</html>
