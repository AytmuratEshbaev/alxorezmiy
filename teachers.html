<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0D0D5C">
  <title>O'qituvchilar - Al-Xorazmiy ixtisoslashtirilgan maktabi</title>
  <meta name="description" content="Oliy toifali tajribali o'qituvchilar jamoasi. Yutuqlari, malakasi va ularning sertifikatlari bilan tanishing.">
  <link rel="canonical" href="https://alxorezmiy.uz/teachers">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/images/logo.png">
  <link rel="apple-touch-icon" href="assets/images/logo.png">
  <link rel="manifest" href="manifest.json">
  <meta property="og:title" content="O'qituvchilar - Al-Xorazmiy ixtisoslashtirilgan maktabi">
  <meta property="og:description" content="Oliy toifali tajribali o'qituvchilar jamoasi. Yutuqlari, malakasi va ularning sertifikatlari bilan tanishing.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://alxorezmiy.uz/teachers">
  <meta property="og:site_name" content="Al-Xorazmiy maktabi">
  <meta property="og:locale" content="uz_UZ">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="O'qituvchilar - Al-Xorazmiy ixtisoslashtirilgan maktabi">
  <meta name="twitter:description" content="Oliy toifali tajribali o'qituvchilar jamoasi. Yutuqlari, malakasi va ularning sertifikatlari bilan tanishing.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://ik.imagekit.io" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dark-theme.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

  <div id="navbar-mount"></div>
  <div id="mobile-nav-mount"></div>
  <!-- ══════ PAGE HEADER ══════ -->
  <div class="page-header">
    <h1 data-i18n="nav.teachers">O'qituvchilar</h1>
    <div class="breadcrumb">
      <a href="index.html" data-i18n="common.home">Bosh sahifa</a>
      <span class="separator">/</span>
      <span class="current" data-i18n="nav.teachers">O'qituvchilar</span>
    </div>
  </div>

  <!-- ══════ TEACHERS GRID ══════ -->
  <section class="section">
    <div class="container">
      <div class="flex-between" style="margin-bottom:var(--space-2xl);flex-wrap:wrap;gap:var(--space-md);">
        <div>
          <h2 style="margin-bottom:8px;">Bizning Pedagoglar</h2>
          <p>Oliy toifali va tajribali ustozlar jamoasi</p>
        </div>
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="teacherSearch" class="form-control" placeholder="Ism yoki fan bo'yicha qidirish..." style="width:300px;border-radius:var(--radius-full);">
        </div>
      </div>

      <div class="filter-group" id="teacherFilters">
        <button class="filter-btn active" data-filter="all" data-i18n="common.all">Barchasi</button>
        <button class="filter-btn" data-filter="Matematika" data-i18n="directions_list.math">Matematika</button>
        <button class="filter-btn" data-filter="Fizika" data-i18n="directions_list.physics">Fizika</button>
        <button class="filter-btn" data-filter="Informatika" data-i18n="directions_list.informatics">Informatika</button>
        <button class="filter-btn" data-filter="Kimyo" data-i18n="directions_list.chemistry">Kimyo</button>
        <button class="filter-btn" data-filter="Biologiya" data-i18n="directions_list.biology">Biologiya</button>
        <button class="filter-btn" data-filter="Ingliz tili">Ingliz tili</button>
      </div>

      <div class="grid grid-4" id="teachersGrid">
        <!-- Filled by JS -->
      </div>
      
      <div id="noResults" class="empty-state hidden">
        <div class="empty-state-icon">🔍</div>
        <h3 data-i18n="common.no_results">Natija topilmadi</h3>
        <p>Boshqa kalit so'z bilan qidirib ko'ring yoki barcha o'qituvchilarni ko'ring.</p>
      </div>
    </div>
  </section>

  <!-- ══════ TEACHER MODAL ══════ -->
  <div class="modal-overlay" id="teacherModal">
    <div class="modal" style="max-width:780px;">
      <div class="modal-header">
        <h3 id="modalName">O'qituvchi</h3>
        <div class="modal-close" onclick="closeModal('teacherModal')">✕</div>
      </div>
      <div class="grid grid-2" style="gap:var(--space-xl);align-items:start;">
        <img id="modalPhoto" src="" alt="Teacher" style="width:100%;border-radius:var(--radius-lg);box-shadow:var(--shadow-md);">
        <div>
          <div style="margin-bottom:var(--space-md);">
            <strong style="display:block;font-size:0.85rem;color:var(--text-tertiary);text-transform:uppercase;">Fan</strong>
            <span id="modalSubject" style="font-size:1.1rem;color:var(--primary);font-weight:600;"></span>
          </div>
          <div style="margin-bottom:var(--space-md);" id="modalCategoryWrap">
            <strong style="display:block;font-size:0.85rem;color:var(--text-tertiary);text-transform:uppercase;">Toifa</strong>
            <span id="modalCategory"></span>
          </div>
          <div style="margin-bottom:var(--space-md);" id="modalExperienceWrap">
            <strong style="display:block;font-size:0.85rem;color:var(--text-tertiary);text-transform:uppercase;">Tajriba</strong>
            <span id="modalExperience"></span> yil
          </div>
        </div>
      </div>
      <div id="modalAchievementsWrap" style="margin-top:var(--space-xl);display:none;">
        <h4 style="margin-bottom:var(--space-md);display:flex;align-items:center;gap:8px;">🏅 Yutuqlar</h4>
        <ul id="modalAchievements" style="display:flex;flex-direction:column;gap:8px;"></ul>
      </div>
    </div>
  </div>

  <div id="footer-mount"></div>
  <div id="back-to-top-mount"></div>
  <script src="js/site-shell.js"></script>
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/imagekit-upload.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
  <script type="module" src="js/settings-loader.js"></script>
  <script type="module" src="js/site-search.js"></script>
  <script type="module">
    import { subscribeCollection } from './js/firestore-helpers.js';

    const grid = document.getElementById('teachersGrid');
    const noResults = document.getElementById('noResults');
    const searchInput = document.getElementById('teacherSearch');
    const filterBtns = document.querySelectorAll('#teacherFilters .filter-btn');

    let allTeachers = [];
    let currentFilter = 'all';
    let searchQuery = '';

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    }

    function renderTeachers() {
      if (!grid) return;
      let filtered = [...allTeachers];

      if (currentFilter !== 'all') {
        filtered = filtered.filter(t => t.subject === currentFilter);
      }
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(t => {
          const name = (window.getLocalizedField(t, 'name') || '').toLowerCase();
          const subject = (t.subject || '').toLowerCase();
          return name.includes(q) || subject.includes(q);
        });
      }

      if (!filtered.length) {
        grid.innerHTML = '';
        noResults.classList.remove('hidden');
        return;
      }
      noResults.classList.add('hidden');
      grid.innerHTML = filtered.map((t, i) => {
        const achCount = Array.isArray(t.achievements) ? t.achievements.length : 0;
        return `
        <div class="card card-hover animate-on-scroll" style="text-align:center;animation-delay:${i * 0.1}s;cursor:pointer;" data-id="${t.id}">
          <div style="width:120px;height:120px;border-radius:50%;margin:0 auto var(--space-md);overflow:hidden;border:4px solid var(--primary-bg);background:#E2E8F0;display:flex;align-items:center;justify-content:center;font-size:2rem;">
            ${t.photo
              ? `<img src="${window.transformImage ? window.transformImage(t.photo, { width: 240 }) : t.photo}" alt="${escapeHtml(window.getLocalizedField(t, 'name'))}" style="width:100%;height:100%;object-fit:cover;" loading="lazy" onerror="this.replaceWith(document.createTextNode('👤'))">`
              : '👤'}
          </div>
          <h3 style="font-size:1.1rem;margin-bottom:4px;">${escapeHtml(window.getLocalizedField(t, 'name'))}</h3>
          <p style="color:var(--primary);font-weight:600;font-size:0.9rem;margin-bottom:8px;">${escapeHtml(t.subject || '')}</p>
          <div style="display:flex;justify-content:center;gap:8px;flex-wrap:wrap;">
            ${t.category ? `<span style="font-size:0.75rem;background:var(--bg-secondary);padding:2px 8px;border-radius:12px;">${escapeHtml(t.category)}</span>` : ''}
            ${t.experience ? `<span style="font-size:0.75rem;background:var(--bg-secondary);padding:2px 8px;border-radius:12px;">${t.experience} yil tajriba</span>` : ''}
            ${achCount ? `<span style="font-size:0.75rem;background:var(--warning-bg);color:var(--warning);padding:2px 8px;border-radius:12px;">🏅 ${achCount} yutuq</span>` : ''}
          </div>
        </div>
      `;
      }).join('');

      grid.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => showTeacherModal(card.dataset.id));
        setTimeout(() => card.classList.add('visible'), 50);
      });
    }

    const ACHIEVEMENT_LABELS = {
      olympiad: '🏆 Olimpiada',
      certificate: '📜 Sertifikat',
      competition: '🥇 Musobaqa',
      diploma: '🎓 Diplom',
      other: '⭐ Boshqa'
    };

    function showTeacherModal(id) {
      const t = allTeachers.find(x => x.id === id);
      if (!t) return;
      document.getElementById('modalName').textContent = window.getLocalizedField(t, 'name');
      document.getElementById('modalSubject').textContent = t.subject || '';

      const catWrap = document.getElementById('modalCategoryWrap');
      if (t.category) {
        document.getElementById('modalCategory').textContent = t.category;
        catWrap.style.display = '';
      } else {
        catWrap.style.display = 'none';
      }

      const expWrap = document.getElementById('modalExperienceWrap');
      if (t.experience) {
        document.getElementById('modalExperience').textContent = t.experience;
        expWrap.style.display = '';
      } else {
        expWrap.style.display = 'none';
      }

      const img = document.getElementById('modalPhoto');
      if (t.photo) {
        img.src = t.photo;
        img.style.display = 'block';
      } else {
        img.style.display = 'none';
      }

      // Yutuqlar
      const achWrap = document.getElementById('modalAchievementsWrap');
      const achList = document.getElementById('modalAchievements');
      if (Array.isArray(t.achievements) && t.achievements.length) {
        achList.innerHTML = t.achievements.map(a => `
          <li style="display:flex;align-items:flex-start;gap:12px;padding:12px;background:var(--bg-secondary);border-radius:8px;">
            <span style="font-size:1.1rem;white-space:nowrap;color:var(--primary);font-weight:600;">${ACHIEVEMENT_LABELS[a.type] || '⭐'}</span>
            <span style="flex:1;">${escapeHtml(a.title)}</span>
            ${a.year ? `<span style="color:var(--text-tertiary);font-size:0.85rem;white-space:nowrap;">${a.year}</span>` : ''}
          </li>
        `).join('');
        achWrap.style.display = 'block';
      } else {
        achWrap.style.display = 'none';
      }

      openModal('teacherModal');
    }

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.getAttribute('data-filter');
        renderTeachers();
      });
    });

    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        renderTeachers();
      });
    }

    window.onLanguageChange = renderTeachers;

    function showSkeletons() {
      grid.innerHTML = Array(8).fill(0).map(() => `
        <div class="skeleton-card" style="text-align:center;">
          <div class="skeleton-circle"></div>
          <div class="skeleton-line" style="height:14px;width:70%;margin:0 auto 8px;"></div>
          <div class="skeleton-line short" style="height:10px;width:50%;margin:0 auto;"></div>
          <div style="display:flex;gap:6px;justify-content:center;margin-top:12px;">
            <div class="skeleton-line" style="height:18px;width:60px;border-radius:9px;"></div>
            <div class="skeleton-line" style="height:18px;width:80px;border-radius:9px;"></div>
          </div>
        </div>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', async () => {
      showSkeletons();
      await subscribeCollection('teachers', (items) => {
        items.sort((a, b) => (a.name_uz || '').localeCompare(b.name_uz || '', 'uz'));
        allTeachers = items;
        renderTeachers();
      });
    });
  </script>
</body>
</html>
