<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0D0D5C">
  <title>Galereya - Al-Xorazmiy maktabi</title>
  <meta name="description" content="Maktab binosi, dars jarayoni, sport tadbirlari va o'quv hayotidan rasmlar galereyasi.">
  <link rel="canonical" href="https://alxorezmiy.uz/gallery">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/images/logo.png">
  <link rel="apple-touch-icon" href="assets/images/logo.png">
  <link rel="manifest" href="manifest.json">
  <meta property="og:title" content="Galereya - Al-Xorazmiy maktabi">
  <meta property="og:description" content="Maktab binosi, dars jarayoni, sport tadbirlari va o'quv hayotidan rasmlar galereyasi.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://alxorezmiy.uz/gallery">
  <meta property="og:site_name" content="Al-Xorazmiy maktabi">
  <meta property="og:locale" content="uz_UZ">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Galereya - Al-Xorazmiy maktabi">
  <meta name="twitter:description" content="Maktab binosi, dars jarayoni, sport tadbirlari va o'quv hayotidan rasmlar galereyasi.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://ik.imagekit.io" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dark-theme.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

  <div id="navbar-mount"></div>
  <div id="mobile-nav-mount"></div>
  <!-- ══════ PAGE HEADER ══════ -->
  <div class="page-header">
    <h1 data-i18n="nav.gallery">Foto va Video Galereya</h1>
    <div class="breadcrumb">
      <a href="index.html" data-i18n="common.home">Bosh sahifa</a>
      <span class="separator">/</span>
      <span class="current" data-i18n="nav.gallery">Galereya</span>
    </div>
  </div>

  <!-- ══════ GALLERY CONTENT ══════ -->
  <section class="section">
    <div class="container">
      <div class="flex-between" style="margin-bottom:var(--space-xl);flex-wrap:wrap;gap:var(--space-md);">
        <div class="filter-group" id="galleryFilters" style="margin-bottom:0;">
          <button class="filter-btn active" data-filter="all" data-i18n="common.all">Barchasi</button>
          <button class="filter-btn" data-filter="building">🏛 Bino</button>
          <button class="filter-btn" data-filter="lessons">📚 Darslar</button>
          <button class="filter-btn" data-filter="sports">⚽ Sport</button>
          <button class="filter-btn" data-filter="events">🎉 Tadbirlar</button>
        </div>
      </div>

      <div class="grid grid-3" id="galleryGrid">
        <!-- Filled by JS -->
      </div>
      
    </div>
  </section>

  <div id="footer-mount"></div>
  <!-- Basic Image Modal -->
  <div class="modal-overlay" id="imageModal" style="z-index:10000;">
    <div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;padding:var(--space-md);">
      <div class="modal-close" onclick="document.getElementById('imageModal').classList.remove('active')" style="position:absolute;top:20px;right:20px;background:rgba(0,0,0,0.5);color:white;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2;">✕</div>
      <img id="enlargedImg" src="" style="max-width:100%;max-height:90vh;border-radius:var(--radius-lg);box-shadow:var(--shadow-2xl);">
    </div>
  </div>

  <div id="back-to-top-mount"></div>
  <script src="js/site-shell.js"></script>
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/imagekit-upload.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
  <script type="module" src="js/settings-loader.js"></script>
  <script type="module" src="js/site-search.js"></script>
  <script type="module">
    import { subscribeCollection } from './js/firestore-helpers.js';

    const grid = document.getElementById('galleryGrid');
    const filterBtns = document.querySelectorAll('#galleryFilters .filter-btn');
    let allPhotos = [];
    let currentFilter = 'all';

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    }

    function renderGallery() {
      if (!grid) return;
      let filtered = allPhotos;
      if (currentFilter !== 'all') filtered = filtered.filter(p => p.category === currentFilter);

      if (!filtered.length) {
        grid.innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-tertiary);padding:60px;">Hozircha rasmlar yo\'q</p>';
        return;
      }
      grid.innerHTML = filtered.map((item, i) => {
        const caption = window.getLocalizedField(item, 'caption') || '';
        const optimized = window.transformImage ? window.transformImage(item.url, { width: 600 }) : item.url;
        return `
          <div class="gallery-item animate-on-scroll" style="animation-delay:${i * 0.1}s;cursor:pointer;" data-url="${item.url}">
            <img src="${optimized}" alt="${escapeHtml(caption)}" loading="lazy">
            ${caption ? `<div class="gallery-caption">${escapeHtml(caption)}</div>` : ''}
          </div>
        `;
      }).join('');

      grid.querySelectorAll('.gallery-item').forEach(el => {
        el.addEventListener('click', () => openImage(el.dataset.url));
        setTimeout(() => el.classList.add('visible'), 50);
      });
    }

    function openImage(url) {
      document.getElementById('enlargedImg').src = url;
      document.getElementById('imageModal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.getAttribute('data-filter');
        renderGallery();
      });
    });

    window.onLanguageChange = renderGallery;

    document.getElementById('imageModal').addEventListener('click', function(e) {
      if (e.target === this || e.target.id === 'enlargedImg' === false && e.target.tagName !== 'IMG') {
        this.classList.remove('active');
        document.body.style.overflow = '';
      }
    });

    function showSkeletons() {
      grid.innerHTML = Array(9).fill(0).map(() => `
        <div class="skeleton" style="aspect-ratio:4/3;border-radius:var(--r-md);"></div>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', async () => {
      showSkeletons();
      await subscribeCollection('gallery', (items) => {
        allPhotos = items;
        renderGallery();
      }, { orderBy: 'createdAt', direction: 'desc' });
    });
  </script>
</body>
</html>
