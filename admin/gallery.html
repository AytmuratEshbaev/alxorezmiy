<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galereya — Admin Panel</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .gallery-admin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .gallery-admin-item { position: relative; border-radius: 12px; overflow: hidden; aspect-ratio: 4/3; background: #E2E8F0; cursor: pointer; }
    .gallery-admin-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .gallery-admin-item:hover img { transform: scale(1.05); }
    .gallery-admin-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.3) 50%, transparent 100%); padding: 12px; display: flex; flex-direction: column; justify-content: space-between; opacity: 0; transition: opacity 0.2s; }
    .gallery-admin-item:hover .gallery-admin-overlay { opacity: 1; }
    .gallery-admin-info { color: white; }
    .gallery-admin-info p { margin-top: 4px; font-size: 0.85rem; }
    .gallery-admin-actions { display: flex; gap: 8px; align-self: flex-end; }
    .gallery-admin-actions .action-btn { background: white; }
  </style>
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><div class="sidebar-logo">AX</div><div class="sidebar-title">Admin Panel</div></div>
      <nav class="sidebar-nav">
        <div class="nav-section">Asosiy</div>
        <a href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Dashboard</a>
        <div class="nav-section">Kontent</div>
        <a href="news.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>Yangiliklar</a>
        <a href="teachers.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>O'qituvchilar</a>
        <a href="olympiad.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>Olimpiada</a>
        <a href="gallery.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Galereya</a>
        <a href="faq.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>FAQ</a>
        <a href="messages.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Xabarlar</a>
        <div class="nav-section">Sozlamalar</div>
        <a href="settings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>Umumiy</a>
        <a href="users.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Adminlar</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="admin-navbar">
        <div class="navbar-left">
          <button class="sidebar-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
          <div class="page-title">Galereya</div>
        </div>
        <div class="navbar-right">
          <div class="user-profile"><div class="user-avatar">A</div><div class="user-info"><span class="user-name">Admin</span><span class="user-role">Superadmin</span></div></div>
          <button class="btn-logout" id="logoutBtn">Chiqish</button>
        </div>
      </header>

      <div class="content-area">
        <div class="admin-card">
          <div class="card-header">
            <h2 class="card-title">Galereya rasmlari</h2>
            <button class="btn btn-primary" id="addGalleryBtn">+ Qo'shish</button>
          </div>
          <div id="galleryGrid" class="gallery-admin-grid">
            <div style="grid-column:1/-1;text-align:center;padding:40px;color:#94A3B8;">Yuklanmoqda...</div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="galleryModal">
    <div class="modal" style="max-width:680px;">
      <div class="modal-header">
        <h3 class="modal-title" id="galleryModalTitle">Yangi rasm</h3>
        <button class="modal-close" id="galleryModalClose" type="button"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <form id="galleryForm">
        <div class="modal-body">
          <div class="form-group">
            <label>Rasm *</label>
            <div class="image-uploader">
              <input type="file" id="galleryImageInput" accept="image/*" hidden>
              <button type="button" class="btn btn-outline" onclick="document.getElementById('galleryImageInput').click()">📷 Rasm tanlash</button>
              <img id="galleryImagePreview" style="display:none;max-width:100%;max-height:280px;object-fit:contain;border-radius:8px;margin:12px auto 0;">
              <div id="galleryImageProgress" style="display:none;margin-top:8px;">
                <div style="background:#E2E8F0;border-radius:4px;overflow:hidden;height:6px;"><div id="galleryImageProgressBar" style="background:#3B82F6;height:100%;width:0%;transition:width 0.2s;"></div></div>
                <small id="galleryImageProgressText" style="color:#64748B;">0%</small>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>Kategoriya</label>
            <select class="form-control" id="galleryCategory">
              <option value="building">🏛 Bino</option>
              <option value="lessons">📚 Darslar</option>
              <option value="sports">⚽ Sport</option>
              <option value="events">🎉 Tadbirlar</option>
            </select>
          </div>

          <div class="lang-tabs-bar">
            <button type="button" class="lang-tab active" data-lang="uz">🇺🇿 O'zbek</button>
            <button type="button" class="lang-tab" data-lang="ru">🇷🇺 Русский</button>
            <button type="button" class="lang-tab" data-lang="kk">🏳️ Qaraqalpaq</button>
            <button type="button" class="lang-tab" data-lang="en">🇬🇧 English</button>
          </div>

          <div class="lang-panel active" data-lang="uz"><div class="form-group"><label>Tavsif (UZ)</label><input type="text" class="form-control" id="galleryCaption_uz" placeholder="Maktab binosi"></div></div>
          <div class="lang-panel" data-lang="ru"><div class="form-group"><label>Описание (RU)</label><input type="text" class="form-control" id="galleryCaption_ru"></div></div>
          <div class="lang-panel" data-lang="kk"><div class="form-group"><label>Tariypı (KK)</label><input type="text" class="form-control" id="galleryCaption_kk"></div></div>
          <div class="lang-panel" data-lang="en"><div class="form-group"><label>Caption (EN)</label><input type="text" class="form-control" id="galleryCaption_en"></div></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" id="galleryCancelBtn">Bekor qilish</button>
          <button type="submit" class="btn btn-primary" id="gallerySubmitBtn">Saqlash</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/imagekit-upload.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/gallery.js"></script>
</body>
</html>
