<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yangiliklar — Admin Panel | Al-Xorazmiy</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <!-- ══════ SIDEBAR ══════ -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">AX</div>
        <div class="sidebar-title">Admin Panel</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Asosiy sahifalar</div>
        <a href="index.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Dashboard
        </a>
        <div class="nav-section">Kontent</div>
        <a href="news.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
          Yangiliklar
        </a>
        <a href="teachers.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          O'qituvchilar
        </a>
        <a href="olympiad.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
          Olimpiada natijalari
        </a>
        <a href="gallery.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Galereya
        </a>
        <a href="faq.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          FAQ
        </a>
        <div class="nav-section">Sozlamalar</div>
        <a href="settings.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
          Umumiy
        </a>
        <a href="users.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Adminlar
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="admin-navbar">
        <div class="navbar-left">
          <button class="sidebar-toggle" onclick="toggleSidebar()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="page-title">Yangiliklar</div>
        </div>
        <div class="navbar-right">
          <div class="user-profile">
            <div class="user-avatar">A</div>
            <div class="user-info">
              <span class="user-name">Admin</span>
              <span class="user-role">Superadmin</span>
            </div>
          </div>
          <button class="btn-logout" id="logoutBtn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Chiqish
          </button>
        </div>
      </header>

      <div class="content-area">
        <div class="admin-card">
          <div class="card-header">
            <h2 class="card-title">Barcha yangiliklar</h2>
            <button class="btn btn-primary" id="addNewsBtn">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Qo'shish
            </button>
          </div>
          <div class="table-responsive">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Rasm</th>
                  <th>Sarlavha (UZ)</th>
                  <th>Sana</th>
                  <th>Kategoriya</th>
                  <th>Holati</th>
                  <th>Amallar</th>
                </tr>
              </thead>
              <tbody id="newsTableBody">
                <tr><td colspan="6" style="text-align:center;padding:40px;color:#94A3B8;">Yuklanmoqda...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- ══════ NEWS MODAL ══════ -->
  <div class="modal-overlay" id="newsModal">
    <div class="modal" style="max-width:760px;">
      <div class="modal-header">
        <h3 class="modal-title" id="newsModalTitle">Yangi yangilik qo'shish</h3>
        <button class="modal-close" id="newsModalClose" type="button">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="newsForm">
        <div class="modal-body">

          <!-- Rasm yuklash -->
          <div class="form-group">
            <label>Rasm</label>
            <div class="image-uploader">
              <input type="file" id="newsImageInput" accept="image/*" hidden>
              <button type="button" class="btn btn-outline" onclick="document.getElementById('newsImageInput').click()">
                📷 Rasm tanlash
              </button>
              <img id="newsImagePreview" style="display:none;width:100%;max-height:240px;object-fit:cover;border-radius:8px;margin-top:12px;">
              <div id="newsImageProgress" style="display:none;margin-top:8px;">
                <div style="background:#E2E8F0;border-radius:4px;overflow:hidden;height:6px;">
                  <div id="newsImageProgressBar" style="background:#3B82F6;height:100%;width:0%;transition:width 0.2s;"></div>
                </div>
                <small id="newsImageProgressText" style="color:#64748B;">0%</small>
              </div>
            </div>
          </div>

          <!-- Kategoriya + Holat -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
              <label>Kategoriya</label>
              <select class="form-control" id="newsCategory" required>
                <option value="announcements">E'lon</option>
                <option value="events">Tadbir</option>
              </select>
            </div>
            <div class="form-group">
              <label>Holati</label>
              <select class="form-control" id="newsStatus" required>
                <option value="published">Nashr etilgan</option>
                <option value="draft">Qoralama</option>
              </select>
            </div>
          </div>

          <!-- Til tablari -->
          <div class="lang-tabs-bar">
            <button type="button" class="lang-tab active" data-lang="uz">🇺🇿 O'zbek</button>
            <button type="button" class="lang-tab" data-lang="ru">🇷🇺 Русский</button>
            <button type="button" class="lang-tab" data-lang="kk">🏳️ Qaraqalpaq</button>
            <button type="button" class="lang-tab" data-lang="en">🇬🇧 English</button>
          </div>

          <!-- Til paneli — UZ -->
          <div class="lang-panel active" data-lang="uz">
            <div class="form-group">
              <label>Sarlavha (UZ) *</label>
              <input type="text" class="form-control" id="newsTitle_uz" required>
            </div>
            <div class="form-group">
              <label>Matn (UZ) *</label>
              <textarea class="form-control" id="newsContent_uz" rows="6" required></textarea>
            </div>
          </div>

          <!-- Til paneli — RU -->
          <div class="lang-panel" data-lang="ru">
            <div class="form-group">
              <label>Заголовок (RU)</label>
              <input type="text" class="form-control" id="newsTitle_ru">
            </div>
            <div class="form-group">
              <label>Текст (RU)</label>
              <textarea class="form-control" id="newsContent_ru" rows="6"></textarea>
            </div>
          </div>

          <!-- Til paneli — KK -->
          <div class="lang-panel" data-lang="kk">
            <div class="form-group">
              <label>Sarlawhası (KK)</label>
              <input type="text" class="form-control" id="newsTitle_kk">
            </div>
            <div class="form-group">
              <label>Tekst (KK)</label>
              <textarea class="form-control" id="newsContent_kk" rows="6"></textarea>
            </div>
          </div>

          <!-- Til paneli — EN -->
          <div class="lang-panel" data-lang="en">
            <div class="form-group">
              <label>Title (EN)</label>
              <input type="text" class="form-control" id="newsTitle_en">
            </div>
            <div class="form-group">
              <label>Content (EN)</label>
              <textarea class="form-control" id="newsContent_en" rows="6"></textarea>
            </div>
          </div>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" id="newsCancelBtn">Bekor qilish</button>
          <button type="submit" class="btn btn-primary" id="newsSubmitBtn">Saqlash</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/imagekit-upload.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/news.js"></script>
</body>
</html>
