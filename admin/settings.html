<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Umumiy sozlamalar — Admin Panel</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><div class="sidebar-logo">AX</div><div class="sidebar-title">Admin Panel</div></div>
      <nav class="sidebar-nav">
        <div class="nav-section">Asosiy</div>
        <a href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Dashboard</a>
        <div class="nav-section">Kontent</div>
        <a href="news.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>Yangiliklar</a>
        <a href="teachers.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>O'qituvchilar</a>
        <a href="olympiad.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>Olimpiada</a>
        <a href="gallery.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/></svg>Galereya</a>
        <a href="faq.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/></svg>FAQ</a>
        <a href="messages.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Xabarlar</a>
        <div class="nav-section">Sozlamalar</div>
        <a href="settings.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>Umumiy</a>
        <a href="users.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Adminlar</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="admin-navbar">
        <div class="navbar-left">
          <button class="sidebar-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
          <div class="page-title">Umumiy sozlamalar</div>
        </div>
        <div class="navbar-right">
          <div class="user-profile"><div class="user-avatar">A</div><div class="user-info"><span class="user-name">Admin</span><span class="user-role">Superadmin</span></div></div>
          <button class="btn-logout" id="logoutBtn">Chiqish</button>
        </div>
      </header>

      <div class="content-area">
        <form id="settingsForm">
          <!-- Maktab nomi -->
          <div class="admin-card">
            <div class="card-header"><h2 class="card-title">📛 Maktab nomi</h2></div>

            <div class="lang-group">
              <div class="lang-tabs-bar">
                <button type="button" class="lang-tab active" data-lang="uz">🇺🇿 O'zbek</button>
                <button type="button" class="lang-tab" data-lang="ru">🇷🇺 Русский</button>
                <button type="button" class="lang-tab" data-lang="kk">🏳️ Qaraqalpaq</button>
                <button type="button" class="lang-tab" data-lang="en">🇬🇧 English</button>
              </div>
              <div class="lang-panel active" data-lang="uz">
                <div class="form-group"><label>To'liq nom (UZ)</label><textarea class="form-control" id="fullName_uz" rows="2"></textarea></div>
                <div class="form-group"><label>Qisqa nom (UZ)</label><input type="text" class="form-control" id="shortName_uz"></div>
              </div>
              <div class="lang-panel" data-lang="ru">
                <div class="form-group"><label>Полное название (RU)</label><textarea class="form-control" id="fullName_ru" rows="2"></textarea></div>
                <div class="form-group"><label>Короткое название (RU)</label><input type="text" class="form-control" id="shortName_ru"></div>
              </div>
              <div class="lang-panel" data-lang="kk">
                <div class="form-group"><label>Tolıq atı (KK)</label><textarea class="form-control" id="fullName_kk" rows="2"></textarea></div>
                <div class="form-group"><label>Qısqa atı (KK)</label><input type="text" class="form-control" id="shortName_kk"></div>
              </div>
              <div class="lang-panel" data-lang="en">
                <div class="form-group"><label>Full name (EN)</label><textarea class="form-control" id="fullName_en" rows="2"></textarea></div>
                <div class="form-group"><label>Short name (EN)</label><input type="text" class="form-control" id="shortName_en"></div>
              </div>
            </div>
          </div>

          <!-- Kontakt -->
          <div class="admin-card">
            <div class="card-header"><h2 class="card-title">📞 Kontakt ma'lumotlari</h2></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
              <div class="form-group"><label>📍 Manzil</label><input type="text" class="form-control" id="contactAddress" placeholder="Nukus shahri, ..."></div>
              <div class="form-group"><label>📞 Telefon</label><input type="text" class="form-control" id="contactPhone" placeholder="+998 61 222-33-44"></div>
              <div class="form-group"><label>📧 Email</label><input type="email" class="form-control" id="contactEmail" placeholder="info@alxorazmiy-nukus.uz"></div>
              <div class="form-group"><label>🕐 Ish vaqti</label><input type="text" class="form-control" id="contactHours" placeholder="Du-Sh: 08:00-17:00"></div>
            </div>
          </div>

          <!-- Ijtimoiy tarmoqlar -->
          <div class="admin-card">
            <div class="card-header"><h2 class="card-title">🌐 Ijtimoiy tarmoqlar</h2></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
              <div class="form-group"><label>✈️ Telegram</label><input type="url" class="form-control" id="socialTelegram" placeholder="https://t.me/..."></div>
              <div class="form-group"><label>📷 Instagram</label><input type="url" class="form-control" id="socialInstagram" placeholder="https://instagram.com/..."></div>
              <div class="form-group"><label>📘 Facebook</label><input type="url" class="form-control" id="socialFacebook" placeholder="https://facebook.com/..."></div>
              <div class="form-group"><label>▶️ YouTube</label><input type="url" class="form-control" id="socialYoutube" placeholder="https://youtube.com/..."></div>
            </div>
          </div>

          <!-- Statistika -->
          <div class="admin-card">
            <div class="card-header"><h2 class="card-title">📊 Statistika (bosh sahifa)</h2></div>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;">
              <div class="form-group"><label>O'quvchilar</label><input type="number" class="form-control" id="statsStudents" min="0"></div>
              <div class="form-group"><label>O'qituvchilar</label><input type="number" class="form-control" id="statsTeachers" min="0"></div>
              <div class="form-group"><label>Yillik tajriba</label><input type="number" class="form-control" id="statsExperience" min="0"></div>
              <div class="form-group"><label>Olimpiada g'oliblari</label><input type="number" class="form-control" id="statsOlympiad" min="0"></div>
            </div>
          </div>

          <div style="display:flex;justify-content:flex-end;gap:12px;">
            <button type="submit" class="btn btn-primary" id="settingsSubmitBtn" style="padding:12px 32px;">
              💾 Saqlash
            </button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/settings.js"></script>
</body>
</html>
