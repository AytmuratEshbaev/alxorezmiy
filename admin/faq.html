<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAQ — Admin Panel</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header"><div class="sidebar-logo">AX</div><div class="sidebar-title">Admin Panel</div></div>
      <nav class="sidebar-nav">
        <div class="nav-section">Asosiy</div>
        <a href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Dashboard</a>
        <div class="nav-section">Kontent</div>
        <a href="news.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>Yangiliklar</a>
        <a href="teachers.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>O'qituvchilar</a>
        <a href="olympiad.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>Olimpiada</a>
        <a href="gallery.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Galereya</a>
        <a href="faq.html" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>FAQ</a>
        <a href="messages.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Xabarlar</a>
        <div class="nav-section">Sozlamalar</div>
        <a href="settings.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/></svg>Umumiy</a>
        <a href="users.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Adminlar</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="admin-navbar">
        <div class="navbar-left">
          <button class="sidebar-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
          <div class="page-title">FAQ — Tez-tez beriladigan savollar</div>
        </div>
        <div class="navbar-right">
          <div class="user-profile"><div class="user-avatar">A</div><div class="user-info"><span class="user-name">Admin</span><span class="user-role">Superadmin</span></div></div>
          <button class="btn-logout" id="logoutBtn">Chiqish</button>
        </div>
      </header>

      <div class="content-area">
        <div class="admin-card">
          <div class="card-header">
            <h2 class="card-title">Savol-javoblar ro'yxati</h2>
            <button class="btn btn-primary" id="addFaqBtn">+ Qo'shish</button>
          </div>
          <div class="table-responsive">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Savol (UZ)</th>
                  <th>Kategoriya</th>
                  <th>Tartib</th>
                  <th>Amallar</th>
                </tr>
              </thead>
              <tbody id="faqTableBody">
                <tr><td colspan="4" style="text-align:center;padding:40px;color:#94A3B8;">Yuklanmoqda...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="faqModal">
    <div class="modal" style="max-width:760px;">
      <div class="modal-header">
        <h3 class="modal-title" id="faqModalTitle">Yangi savol</h3>
        <button class="modal-close" id="faqModalClose" type="button"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <form id="faqForm">
        <div class="modal-body">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
              <label>Kategoriya</label>
              <select class="form-control" id="faqCategory">
                <option value="general">💬 Umumiy</option>
                <option value="admission">📝 Qabul</option>
                <option value="education">📚 Ta'lim</option>
              </select>
            </div>
            <div class="form-group">
              <label>Tartib raqami</label>
              <input type="number" class="form-control" id="faqOrder" min="0" value="0">
            </div>
          </div>

          <div class="lang-tabs-bar">
            <button type="button" class="lang-tab active" data-lang="uz">🇺🇿 O'zbek</button>
            <button type="button" class="lang-tab" data-lang="ru">🇷🇺 Русский</button>
            <button type="button" class="lang-tab" data-lang="kk">🏳️ Qaraqalpaq</button>
            <button type="button" class="lang-tab" data-lang="en">🇬🇧 English</button>
          </div>

          <div class="lang-panel active" data-lang="uz">
            <div class="form-group"><label>Savol (UZ) *</label><input type="text" class="form-control" id="faqQuestion_uz" required></div>
            <div class="form-group"><label>Javob (UZ) *</label><textarea class="form-control" id="faqAnswer_uz" rows="4" required></textarea></div>
          </div>
          <div class="lang-panel" data-lang="ru">
            <div class="form-group"><label>Вопрос (RU)</label><input type="text" class="form-control" id="faqQuestion_ru"></div>
            <div class="form-group"><label>Ответ (RU)</label><textarea class="form-control" id="faqAnswer_ru" rows="4"></textarea></div>
          </div>
          <div class="lang-panel" data-lang="kk">
            <div class="form-group"><label>Sorawı (KK)</label><input type="text" class="form-control" id="faqQuestion_kk"></div>
            <div class="form-group"><label>Juwap (KK)</label><textarea class="form-control" id="faqAnswer_kk" rows="4"></textarea></div>
          </div>
          <div class="lang-panel" data-lang="en">
            <div class="form-group"><label>Question (EN)</label><input type="text" class="form-control" id="faqQuestion_en"></div>
            <div class="form-group"><label>Answer (EN)</label><textarea class="form-control" id="faqAnswer_en" rows="4"></textarea></div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" id="faqCancelBtn">Bekor qilish</button>
          <button type="submit" class="btn btn-primary" id="faqSubmitBtn">Saqlash</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/faq.js"></script>
</body>
</html>
