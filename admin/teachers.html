<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O'qituvchilar — Admin Panel | Al-Xorazmiy</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">AX</div>
        <div class="sidebar-title">Admin Panel</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Asosiy sahifalar</div>
        <a href="index.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Dashboard
        </a>
        <div class="nav-section">Kontent</div>
        <a href="news.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
          Yangiliklar
        </a>
        <a href="teachers.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          O'qituvchilar
        </a>
        <a href="olympiad.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
          Olimpiada natijalari
        </a>
        <a href="gallery.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Galereya
        </a>
        <a href="faq.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          FAQ
        </a>
        <div class="nav-section">Sozlamalar</div>
        <a href="settings.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
          Umumiy
        </a>
        <a href="users.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Adminlar
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="admin-navbar">
        <div class="navbar-left">
          <button class="sidebar-toggle" onclick="toggleSidebar()">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="page-title">O'qituvchilar</div>
        </div>
        <div class="navbar-right">
          <div class="user-profile">
            <div class="user-avatar">A</div>
            <div class="user-info">
              <span class="user-name">Admin</span>
              <span class="user-role">Superadmin</span>
            </div>
          </div>
          <button class="btn-logout" id="logoutBtn">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Chiqish
          </button>
        </div>
      </header>

      <div class="content-area">
        <div class="admin-card">
          <div class="card-header">
            <h2 class="card-title">Barcha o'qituvchilar</h2>
            <button class="btn btn-primary" id="addTeacherBtn">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              Qo'shish
            </button>
          </div>
          <div class="admin-toolbar" style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
            <div style="position:relative;flex:1;min-width:240px;max-width:400px;">
              <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94A3B8;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              <input type="text" id="teacherSearch" class="form-control" placeholder="F.I.O. yoki fan bo'yicha qidirish..." style="padding-left:40px;">
            </div>
            <select class="form-control" id="teacherFilterCategory" style="max-width:200px;">
              <option value="all">Barcha toifa</option>
              <option value="Mutaxasis">Mutaxasis</option>
              <option value="2-toifa">2-toifa</option>
              <option value="1-toifa">1-toifa</option>
              <option value="Oliy">Oliy</option>
            </select>
          </div>
          <div class="table-responsive">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Rasm</th>
                  <th>F.I.O. (UZ)</th>
                  <th>Fan</th>
                  <th>Toifa</th>
                  <th>Tajriba</th>
                  <th>Yutuqlar</th>
                  <th>Amallar</th>
                </tr>
              </thead>
              <tbody id="teachersTableBody">
                <tr><td colspan="7" style="text-align:center;padding:40px;color:#94A3B8;">Yuklanmoqda...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- ══════ TEACHER MODAL ══════ -->
  <div class="modal-overlay" id="teacherModal">
    <div class="modal" style="max-width:760px;">
      <div class="modal-header">
        <h3 class="modal-title" id="teacherModalTitle">Yangi o'qituvchi qo'shish</h3>
        <button class="modal-close" id="teacherModalClose" type="button">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="teacherForm">
        <div class="modal-body">

          <!-- Rasm -->
          <div class="form-group">
            <label>Rasm</label>
            <div class="image-uploader">
              <input type="file" id="teacherPhotoInput" accept="image/*" hidden>
              <button type="button" class="btn btn-outline" onclick="document.getElementById('teacherPhotoInput').click()">
                📷 Rasm tanlash
              </button>
              <img id="teacherPhotoPreview" style="display:none;width:140px;height:140px;border-radius:50%;object-fit:cover;margin:12px auto 0;border:4px solid #E2E8F0;">
              <div id="teacherPhotoProgress" style="display:none;margin-top:8px;">
                <div style="background:#E2E8F0;border-radius:4px;overflow:hidden;height:6px;">
                  <div id="teacherPhotoProgressBar" style="background:#3B82F6;height:100%;width:0%;transition:width 0.2s;"></div>
                </div>
                <small id="teacherPhotoProgressText" style="color:#64748B;">0%</small>
              </div>
            </div>
          </div>

          <!-- Asosiy ma'lumotlar -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
              <label>Fan *</label>
              <input type="text" class="form-control" id="teacherSubject" placeholder="Matematika" required>
            </div>
            <div class="form-group">
              <label>Toifa</label>
              <select class="form-control" id="teacherCategory">
                <option value="">— Tanlanmagan —</option>
                <option value="Mutaxasis">Mutaxasis</option>
                <option value="2-toifa">2-toifa</option>
                <option value="1-toifa">1-toifa</option>
                <option value="Oliy">Oliy</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Tajriba (yil)</label>
            <input type="number" class="form-control" id="teacherExperience" min="0" max="60" value="0" style="max-width:200px;">
          </div>

          <!-- Yutuqlar -->
          <div class="form-group">
            <label>Yutuqlar</label>
            <div id="achievementsList" class="achievements-list"></div>
            <button type="button" class="add-achievement-btn" id="addAchievementBtn">
              + Yutuq qo'shish
            </button>
          </div>

          <!-- Til tablari (ism uchun) -->
          <div class="lang-tabs-bar">
            <button type="button" class="lang-tab active" data-lang="uz">🇺🇿 O'zbek</button>
            <button type="button" class="lang-tab" data-lang="ru">🇷🇺 Русский</button>
            <button type="button" class="lang-tab" data-lang="kk">🏳️ Qaraqalpaq</button>
            <button type="button" class="lang-tab" data-lang="en">🇬🇧 English</button>
          </div>

          <div class="lang-panel active" data-lang="uz">
            <div class="form-group">
              <label>F.I.O. (UZ) *</label>
              <input type="text" class="form-control" id="teacherName_uz" placeholder="Karimov Alisher Baxtiyorovich" required>
            </div>
          </div>

          <div class="lang-panel" data-lang="ru">
            <div class="form-group">
              <label>Ф.И.О. (RU)</label>
              <input type="text" class="form-control" id="teacherName_ru" placeholder="Каримов Алишер Бахтиёрович">
            </div>
          </div>

          <div class="lang-panel" data-lang="kk">
            <div class="form-group">
              <label>F.I.O. (KK)</label>
              <input type="text" class="form-control" id="teacherName_kk" placeholder="Karimov Alisher Baxtiyoroviç">
            </div>
          </div>

          <div class="lang-panel" data-lang="en">
            <div class="form-group">
              <label>Full Name (EN)</label>
              <input type="text" class="form-control" id="teacherName_en" placeholder="Alisher Karimov">
            </div>
          </div>

        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" id="teacherCancelBtn">Bekor qilish</button>
          <button type="submit" class="btn btn-primary" id="teacherSubmitBtn">Saqlash</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="../js/imagekit-upload.js"></script>
  <script src="js/confirm-dialog.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/teachers.js"></script>
</body>
</html>
