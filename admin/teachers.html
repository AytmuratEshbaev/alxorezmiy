<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O'qituvchilar - Admin Panel | Al-Xorazmiy</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">AX</div>
        <div class="sidebar-title">Admin Panel</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">Asosiy sahifalar</div>
        <a href="index.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Dashboard
        </a>
        <div class="nav-section">Kontent</div>
        <a href="news.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 20H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v1m2 13a2 2 0 0 1-2-2V7m2 13a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
          Yangiliklar
        </a>
        <a href="teachers.html" class="active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          O'qituvchilar
        </a>
        <a href="olympiad.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
          Olimpiada natijalari
        </a>
        <a href="gallery.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          Galereya
        </a>
        <a href="faq.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          FAQ
        </a>
        <div class="nav-section">Sozlamalar</div>
        <a href="settings.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
          Umumiy
        </a>
        <a href="users.html">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Adminlar
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="admin-navbar">
        <div class="navbar-left">
          <button class="sidebar-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/></svg></button>
          <div class="page-title">O'qituvchilar</div>
        </div>
        <div class="navbar-right">
          <div class="user-profile">
            <div class="user-avatar">A</div>
            <div class="user-info"><span class="user-name">Admin</span><span class="user-role">Superadmin</span></div>
          </div>
          <button class="btn-logout" id="logoutBtn">Chiqish</button>
        </div>
      </header>

      <div class="content-area">
        <div class="admin-card">
          <div class="card-header">
            <h2 class="card-title">Barcha o'qituvchilar</h2>
            <button class="btn btn-primary" onclick="openModal('teachersModal')">+ Qo'shish</button>
          </div>
          <div class="table-responsive">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>F.I.O. (UZ)</th>
                  <th>Fan</th>
                  <th>Toifa</th>
                  <th>Tajriba</th>
                  <th>Amallar</th>
                </tr>
              </thead>
              <tbody id="teachersTableBody">
                <!-- Loaded by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="teachersModal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">O'qituvchi formasi</h3>
        <button class="modal-close" onclick="closeModal('teachersModal')">✕</button>
      </div>
      <div class="modal-body">
        <form>
          <div class="form-group">
            <label>Ism-sharifi (UZ)</label>
            <input type="text" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Fan</label>
            <input type="text" class="form-control" required>
          </div>
          <div class="form-group">
            <label>Toifa</label>
            <input type="text" class="form-control" required>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal('teachersModal')">Bekor qilish</button>
        <button class="btn btn-primary" onclick="closeModal('teachersModal')">Saqlash</button>
      </div>
    </div>
  </div>

  <script type="module" src="../js/firebase-config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script>
    window.openModal = (id) => document.getElementById(id).classList.add('active');
    window.closeModal = (id) => document.getElementById(id).classList.remove('active');

    document.addEventListener('DOMContentLoaded', () => {
      const tbody = document.getElementById('teachersTableBody');
      if(window.DemoData && tbody) {
        tbody.innerHTML = window.DemoData.teachers.map(t => `
          <tr>
            <td><strong>${t.name_uz}</strong></td>
            <td>${t.subject}</td>
            <td><span class="badge badge-warning">${t.category}</span></td>
            <td>${t.experience} yil</td>
            <td>
              <div class="table-actions">
                <button class="action-btn edit" onclick="openModal('teachersModal')">✍️</button>
                <button class="action-btn delete">🗑️</button>
              </div>
            </td>
          </tr>
        `).join('');
      }
    });
  </script>
</body>
</html>
