        <a href="gallery.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>Galereya</a>
        <a href="faq.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>FAQ</a>
        <a href="messages.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Xabarlar</a>
        <div class="nav-section">Sozlamalar</div>

      </nav>
    </aside>

    <main class="main-content">
      <header class="admin-navbar">
        <div class="navbar-left">
          <button class="sidebar-toggle" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
          <div class="page-title">Olimpiada natijalari</div>
        </div>
        <div class="navbar-right">
          <div class="user-profile"><div class="user-avatar">A</div><div class="user-info"><span class="user-name">Admin</span><span class="user-role">Superadmin</span></div></div>
          <button class="btn-logout" id="logoutBtn"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Chiqish</button>
        </div>
      </header>

      <div class="content-area">
        <div class="admin-card">
          <div class="card-header">
            <h2 class="card-title">Olimpiada g'oliblar ro'yxati</h2>
            <button class="btn btn-primary" id="addOlyBtn">+ Qo'shish</button>
          </div>
          <div class="table-responsive">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>O'quvchi</th>
                  <th>Fan</th>
                  <th>Daraja</th>
                  <th>O'rin</th>
                  <th>Olimpiada nomi</th>
                  <th>Yil</th>
                  <th>Amallar</th>
                </tr>
              </thead>
              <tbody id="olyTableBody">
                <tr><td colspan="7" style="text-align:center;padding:40px;color:#94A3B8;">Yuklanmoqda...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="olyModal">
    <div class="modal" style="max-width:600px;">
      <div class="modal-header">
        <h3 class="modal-title" id="olyModalTitle">Yangi natija</h3>
        <button class="modal-close" id="olyModalClose" type="button"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <form id="olyForm">
        <div class="modal-body">
          <div class="form-group">
            <label>O'quvchi (F.I.O.) *</label>
            <input type="text" class="form-control" id="olyStudent" placeholder="Ismoilov Jasur" required>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <div class="form-group">
              <label>Fan *</label>
              <input type="text" class="form-control" id="olySubject" placeholder="Matematika" required>
            </div>
            <div class="form-group">
              <label>Daraja *</label>
              <select class="form-control" id="olyLevel" required>
                <option value="respublika">🏛️ Respublika</option>
                <option value="xalqaro">🌍 Xalqaro</option>
                <option value="shahar">🏙️ Shahar</option>
                <option value="tuman">🏘️ Tuman</option>
              </select>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">
            <div class="form-group">
              <label>O'rin *</label>
              <select class="form-control" id="olyPlace" required>
                <option value="1">1-o'rin</option>
                <option value="2">2-o'rin</option>
                <option value="3">3-o'rin</option>
              </select>
            </div>
            <div class="form-group">
              <label>Yil *</label>
              <input type="number" class="form-control" id="olyYear" min="2000" max="2100" required>
            </div>
            <div class="form-group">
              <label>Olimpiada nomi</label>
              <input type="text" class="form-control" id="olyName" placeholder="IMO 2025">
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline" id="olyCancelBtn">Bekor qilish</button>
          <button type="submit" class="btn btn-primary" id="olySubmitBtn">Saqlash</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="../js/firebase-config.js"></script>
  <script src="js/confirm-dialog.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/olympiad.js"></script>
</body>
</html>
