<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1F4E79">
  <title>Yangiliklar va e'lonlar - Al-Xorazmiy maktabi</title>
  <meta name="description" content="Maktab hayotidan eng so'nggi yangiliklar, tadbirlar va e'lonlar. Olimpiada g'alabalari va muhim sanalar.">
  <link rel="canonical" href="https://alxorezmiy.uz/news">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta property="og:title" content="Yangiliklar va e'lonlar - Al-Xorazmiy maktabi">
  <meta property="og:description" content="Maktab hayotidan eng so'nggi yangiliklar, tadbirlar va e'lonlar. Olimpiada g'alabalari va muhim sanalar.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://alxorezmiy.uz/news">
  <meta property="og:site_name" content="Al-Xorazmiy maktabi">
  <meta property="og:locale" content="uz_UZ">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Yangiliklar va e'lonlar - Al-Xorazmiy maktabi">
  <meta name="twitter:description" content="Maktab hayotidan eng so'nggi yangiliklar, tadbirlar va e'lonlar. Olimpiada g'alabalari va muhim sanalar.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://ik.imagekit.io" crossorigin>
  <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dark-theme.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body>

  <div id="navbar-mount"></div>
  <div id="mobile-nav-mount"></div>
  <!-- ══════ PAGE HEADER ══════ -->
  <div class="page-header">
    <h1 data-i18n="nav.news">Yangiliklar va E'lonlar</h1>
    <div class="breadcrumb">
      <a href="index.html" data-i18n="common.home">Bosh sahifa</a>
      <span class="separator">/</span>
      <span class="current" data-i18n="nav.news">Yangiliklar</span>
    </div>
  </div>

  <!-- ══════ NEWS CONTENT ══════ -->
  <section class="section">
    <div class="container">
      <div class="flex-between" style="margin-bottom:var(--space-xl);flex-wrap:wrap;gap:var(--space-md);">
        <div class="filter-group" id="newsFilters" style="margin-bottom:0;">
          <button class="filter-btn active" data-filter="all" data-i18n="common.all">Barchasi</button>
          <button class="filter-btn" data-filter="news">Yangiliklar</button>
          <button class="filter-btn" data-filter="events">Tadbirlar</button>
          <button class="filter-btn" data-filter="announcements">E'lonlar</button>
        </div>
      </div>

      <div class="grid grid-3" id="newsGridPage">
        <!-- Filled by JS -->
      </div>
      
      <div id="noResults" class="hidden" style="text-align:center;padding:var(--space-3xl) 0;color:var(--text-tertiary);">
        <div style="font-size:3rem;margin-bottom:var(--space-md);">📭</div>
        <h3 data-i18n="common.no_results">Hozircha malumot yo'q</h3>
      </div>
      
      <div style="text-align:center;margin-top:var(--space-2xl);">
        <button class="btn btn-secondary" id="loadMoreBtn" style="display:none;">Yana yuklash</button>
      </div>

    </div>
  </section>

  <!-- ══════ NEWS MODAL ══════ -->
  <div class="modal-overlay" id="newsModal">
    <div class="modal" style="max-width:800px;">
      <div class="modal-header">
        <h3 id="modalCategory" style="font-size:0.9rem;color:var(--primary);text-transform:uppercase;">Yangilik</h3>
        <div class="modal-close" onclick="closeModal('newsModal')">✕</div>
      </div>
      <div style="margin-bottom:var(--space-md);">
        <img id="modalImg" src="" alt="News Image" style="width:100%;height:400px;object-fit:cover;border-radius:var(--radius-lg);margin-bottom:var(--space-md);">
        <div style="display:flex;justify-content:space-between;color:var(--text-tertiary);font-size:0.9rem;margin-bottom:var(--space-md);">
          <span id="modalDate"></span>
          <span id="modalViews">👁️ 0 marta o'qildi</span>
        </div>
        <h2 id="modalTitle" style="margin-bottom:var(--space-md);line-height:1.4;"></h2>
        <div id="modalContent" style="line-height:1.8;color:var(--text-secondary);font-size:1.05rem;">
        </div>
      </div>
    </div>
  </div>

  <div id="footer-mount"></div>
  <div id="back-to-top-mount"></div>
  <script src="js/site-shell.js"></script>

  <script type="module" src="js/firebase-config.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>

  <script type="module" src="js/settings-loader.js"></script>
  <script type="module" src="js/site-search.js"></script>
  <script type="module">
    import { subscribeCollection, formatDate } from './js/firestore-helpers.js';

    const grid = document.getElementById('newsGridPage');
    const noResults = document.getElementById('noResults');
    const filterBtns = document.querySelectorAll('#newsFilters .filter-btn');

    let allNews = [];
    let currentFilter = 'all';

    const catMap = {
      'events': "Tadbir",
      'announcements': "E'lon"
    };

    function renderNews() {
      if (!grid) return;
      let filtered = allNews.filter(n => n.status === 'published');
      if (currentFilter !== 'all') filtered = filtered.filter(n => n.category === currentFilter);

      if (!filtered.length) {
        grid.innerHTML = '';
        noResults.classList.remove('hidden');
        return;
      }
      noResults.classList.add('hidden');
      grid.innerHTML = filtered.map((item, i) => `
        <a href="news/${item.id}" class="card card-hover news-card animate-on-scroll" style="animation-delay:${i * 0.1}s;text-decoration:none;color:inherit;display:block;padding:0;overflow:hidden;">
          <div class="card-img">
            <img src="${window.transformImage ? window.transformImage(item.image, { width: 600 }) : item.image}" alt="${escapeHtml(window.getLocalizedField(item, 'title'))}" loading="lazy" onerror="this.style.display='none'">
          </div>
          <div class="news-card-body" style="padding:var(--space-lg);">
            <div class="card-meta">
              <span class="card-category">${catMap[item.category] || item.category}</span>
              <span class="card-date">${formatDate(item.createdAt)}</span>
            </div>
            <h3>${escapeHtml(window.getLocalizedField(item, 'title'))}</h3>
            <p>${escapeHtml((window.getLocalizedField(item, 'content') || '').substring(0, 120))}...</p>
            <span class="read-more" style="margin-top:var(--space-sm);display:inline-block;" data-i18n="common.read_more">Batafsil →</span>
          </div>
        </a>
      `).join('');
      grid.querySelectorAll('.news-card').forEach(card => {
        setTimeout(() => card.classList.add('visible'), 50);
      });
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
    }

    function showNewsModal(id) {
      const item = allNews.find(n => n.id === id);
      if (!item) return;
      document.getElementById('modalCategory').textContent = catMap[item.category] || item.category;
      document.getElementById('modalTitle').textContent = window.getLocalizedField(item, 'title');
      document.getElementById('modalDate').textContent = formatDate(item.createdAt);
      document.getElementById('modalViews').textContent = '';
      const img = document.getElementById('modalImg');
      if (item.image) {
        img.src = item.image;
        img.style.display = 'block';
      } else {
        img.style.display = 'none';
      }
      const paragraphs = (window.getLocalizedField(item, 'content') || '').split('\n\n').map(p => `<p style="margin-bottom:1rem;">${escapeHtml(p)}</p>`).join('');
      document.getElementById('modalContent').innerHTML = paragraphs;
      openModal('newsModal');
    }

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.getAttribute('data-filter');
        renderNews();
      });
    });

    window.onLanguageChange = renderNews;

    document.addEventListener('DOMContentLoaded', async () => {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#94A3B8;">Yuklanmoqda...</div>';
      await subscribeCollection('news', (items) => {
        allNews = items;
        renderNews();
      }, { orderBy: 'createdAt', direction: 'desc' });
    });
  </script>
</body>
</html>
